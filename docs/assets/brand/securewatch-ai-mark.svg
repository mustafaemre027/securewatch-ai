<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="200" height="200" rx="16" fill="#0A0E1A"/>
  
  <!-- Outer Shield -->
  <path d="M 50,40 Q 100,50 150,40 Q 150,110 100,170 Q 50,110 50,40 Z" 
        stroke="#5BC0BE" stroke-width="6" fill="none" stroke-linejoin="round"/>
  
  <!-- Outer Accent Radar Ring -->
  <circle cx="100" cy="100" r="55" stroke="#1C2541" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
  
  <!-- Connection Lines -->
  <line x1="75" y1="75" x2="100" y2="100" stroke="#3A506B" stroke-width="3"/>
  <line x1="125" y1="75" x2="100" y2="100" stroke="#3A506B" stroke-width="3"/>
  <line x1="75" y1="125" x2="100" y2="100" stroke="#3A506B" stroke-width="3"/>
  <line x1="125" y1="125" x2="100" y2="100" stroke="#3A506B" stroke-width="3"/>
  <line x1="75" y1="75" x2="125" y2="75" stroke="#3A506B" stroke-width="1.5"/>
  <line x1="75" y1="125" x2="125" y2="125" stroke="#3A506B" stroke-width="1.5"/>
  
  <!-- Network Nodes (Circles) -->
  <circle cx="100" cy="100" r="10" fill="#6FFFE9"/> <!-- Central AI Node -->
  <circle cx="75" cy="75" r="6" fill="#5BC0BE"/>
  <circle cx="125" cy="75" r="6" fill="#5BC0BE"/>
  <circle cx="75" cy="125" r="6" fill="#5BC0BE"/>
  <circle cx="125" cy="125" r="6" fill="#5BC0BE"/>
</svg>
