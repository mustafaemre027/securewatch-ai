<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <!-- Background -->
  <rect width="600" height="400" rx="12" fill="#0A0E1A"/>
  
  <!-- Header -->
  <text x="40" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">SecureWatch AI</text>
  <text x="40" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#6FFFE9" letter-spacing="1">DESIGN SYSTEM COLOR PALETTE</text>
  
  <!-- Divider -->
  <line x1="40" y1="95" x2="560" y2="95" stroke="#1C2541" stroke-width="2"/>
  
  <!-- Color Swatches -->
  
  <!-- Color 1: Deep Dark (BG) -->
  <g transform="translate(40, 120)">
    <rect width="70" height="140" rx="8" fill="#0A0E1A" stroke="#1C2541" stroke-width="2"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">Deep Dark</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">#0A0E1A</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">App BG</text>
  </g>
  
  <!-- Color 2: Navy (Primary) -->
  <g transform="translate(130, 120)">
    <rect width="70" height="140" rx="8" fill="#0B132B" stroke="#1C2541" stroke-width="1"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">Rich Navy</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">#0B132B</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">Primary Card</text>
  </g>
  
  <!-- Color 3: Space Blue (Secondary) -->
  <g transform="translate(220, 120)">
    <rect width="70" height="140" rx="8" fill="#1C2541" stroke="#3A506B" stroke-width="1"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">Space Blue</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">#1C2541</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">Sec. Card</text>
  </g>
  
  <!-- Color 4: Muted Accent -->
  <g transform="translate(310, 120)">
    <rect width="70" height="140" rx="8" fill="#3A506B"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">Muted Blue</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#FFFFFF" text-anchor="middle">#3A506B</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">Border/Text</text>
  </g>
  
  <!-- Color 5: Cyber Cyan -->
  <g transform="translate(400, 120)">
    <rect width="70" height="140" rx="8" fill="#5BC0BE"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">Cyber Cyan</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#0A0E1A" text-anchor="middle">#5BC0BE</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">Cyber Accent</text>
  </g>
  
  <!-- Color 6: AI Teal -->
  <g transform="translate(490, 120)">
    <rect width="70" height="140" rx="8" fill="#6FFFE9"/>
    <text x="35" y="170" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0" text-anchor="middle">AI Teal</text>
    <text x="35" y="190" font-family="system-ui, sans-serif" font-size="12" font-weight="800" fill="#0A0E1A" text-anchor="middle">#6FFFE9</text>
    <text x="35" y="210" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#A0AEC0" text-anchor="middle">AI Highlight</text>
  </g>

  <!-- Typography note -->
  <text x="40" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#A0AEC0">
    * Standart sistem yazı tipi ailesi (system-ui, sans-serif) kullanılmıştır.
  </text>
</svg>
