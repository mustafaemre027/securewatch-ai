<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <!-- Background -->
  <rect width="500" height="120" rx="8" fill="#0A0E1A"/>
  
  <!-- Shield and AI/Network Symbol Group -->
  <g transform="translate(15, 0)">
    <!-- Outer Shield -->
    <path d="M 50,25 Q 70,30 90,25 Q 90,60 70,90 Q 50,60 50,25 Z" 
          stroke="#5BC0BE" stroke-width="3.5" fill="none" stroke-linejoin="round"/>
    
    <!-- Outer Accent Rings (Subtle radar/network effect) -->
    <circle cx="70" cy="57" r="28" stroke="#1C2541" stroke-width="1" fill="none" stroke-dasharray="3 3"/>
    
    <!-- Connection Lines -->
    <line x1="57" y1="44" x2="70" y2="57" stroke="#3A506B" stroke-width="1.5"/>
    <line x1="83" y1="44" x2="70" y2="57" stroke="#3A506B" stroke-width="1.5"/>
    <line x1="57" y1="70" x2="70" y2="57" stroke="#3A506B" stroke-width="1.5"/>
    <line x1="83" y1="70" x2="70" y2="57" stroke="#3A506B" stroke-width="1.5"/>
    <line x1="57" y1="44" x2="83" y2="44" stroke="#3A506B" stroke-width="1"/>
    <line x1="57" y1="70" x2="83" y2="70" stroke="#3A506B" stroke-width="1"/>
    
    <!-- Network Nodes (Circles) -->
    <circle cx="70" cy="57" r="6" fill="#6FFFE9"/> <!-- Central Node -->
    <circle cx="57" cy="44" r="3.5" fill="#5BC0BE"/>
    <circle cx="83" cy="44" r="3.5" fill="#5BC0BE"/>
    <circle cx="57" cy="70" r="3.5" fill="#5BC0BE"/>
    <circle cx="83" cy="70" r="3.5" fill="#5BC0BE"/>
  </g>
  
  <!-- Text Elements -->
  <!-- "SecureWatch" in bold white -->
  <text x="135" y="65" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">SecureWatch</text>
  
  <!-- "AI" in bold teal -->
  <text x="330" y="65" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="800" fill="#6FFFE9" letter-spacing="-0.5">AI</text>
  
  <!-- Subtitle -->
  <text x="135" y="88" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#A0AEC0" letter-spacing="1.5">AI-POWERED NETWORK DETECTION</text>
</svg>
