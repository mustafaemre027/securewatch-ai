<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="100%" height="100%">
  <!-- Background -->
  <rect width="1440" height="900" fill="#0A0E1A"/>
  
  <!-- UI Mockup Warning Banner -->
  <rect width="1440" height="35" fill="#E53E3E"/>
  <text x="720" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">
    UI MOCKUP — UYGULAMA EKRANI DEĞİLDİR (GÖRSEL TASLAK)
  </text>
  
  <!-- Navigation Bar -->
  <g transform="translate(0, 35)">
    <rect width="1440" height="60" fill="#0B132B" stroke="#1C2541" stroke-width="1"/>
    <!-- Logo Symbol -->
    <path d="M 40,15 Q 50,18 60,15 Q 60,35 50,45 Q 40,35 40,15 Z" stroke="#5BC0BE" stroke-width="2" fill="none"/>
    <circle cx="50" cy="27" r="3" fill="#6FFFE9"/>
    <!-- Logo Text -->
    <text x="75" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#FFFFFF">SecureWatch <tspan fill="#6FFFE9">AI</tspan></text>
    
    <!-- Menu -->
    <text x="260" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#A0AEC0">Dashboard</text>
    <text x="380" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#A0AEC0">Veri Yükleme</text>
    <text x="510" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#A0AEC0">Tespit Sonuçları</text>
    
    <!-- Active Menu: Olay Yönetimi -->
    <text x="660" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#6FFFE9">Olay Yönetimi</text>
    <line x1="660" y1="52" x2="760" y2="52" stroke="#6FFFE9" stroke-width="3"/>
    
    <!-- User Info -->
    <rect x="1180" y="15" width="220" height="30" rx="15" fill="#1C2541"/>
    <circle cx="1195" cy="30" r="8" fill="#5BC0BE"/>
    <text x="1212" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Güvenlik Analisti</text>
    <text x="1312" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#A0AEC0">analyst@sw.ai</text>
  </g>
  
  <!-- Page Header -->
  <g transform="translate(100, 130)">
    <text x="0" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#FFFFFF">Güvenlik Olayları Yönetimi</text>
    <text x="0" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#A0AEC0">
      Şüpheli ağ hareketlerinden tetiklenen güvenlik olaylarının atama, durum güncelleme ve analiz geçmişi.
    </text>
  </g>
  
  <!-- Main Grid Layout -->
  <!-- Left Column: Incident List (W: 590, H: 540) -->
  <g transform="translate(100, 210)">
    <rect width="590" height="540" rx="12" fill="#0B132B" stroke="#1C2541" stroke-width="1.5"/>
    <text x="25" y="40" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Olay Listesi</text>
    
    <!-- Incident Item 1 (Selected/Active) -->
    <g transform="translate(20, 60)">
      <rect width="550" height="110" rx="8" fill="#1C2541" stroke="#5BC0BE" stroke-width="1.5"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">INCIDENT #303: DoS Saldırı Tespiti</text>
      <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Kaynak: 192.168.1.50 | 12.450 Paket | Model Güveni: %94.2</text>
      
      <!-- Badges -->
      <!-- Critical Priority -->
      <rect x="20" y="72" width="80" height="22" rx="4" fill="#E53E3E"/>
      <text x="60" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">CRITICAL</text>
      
      <!-- In Progress Status -->
      <rect x="110" y="72" width="100" height="22" rx="4" fill="#D69E2E"/>
      <text x="160" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">IN_PROGRESS</text>
      
      <!-- Assigned to -->
      <text x="230" y="87" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0">Atanan: analyst@sw.ai</text>
    </g>
    
    <!-- Incident Item 2 -->
    <g transform="translate(20, 185)">
      <rect width="550" height="110" rx="8" fill="#0A0E1A" stroke="#1C2541" stroke-width="1"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">INCIDENT #304: SQL Enjeksiyonu Şüphesi</text>
      <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Kaynak: 172.16.0.4 | 120 Paket | Model Güveni: %87.5</text>
      
      <!-- Badges -->
      <rect x="20" y="72" width="80" height="22" rx="4" fill="#DD6B20"/>
      <text x="60" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">HIGH</text>
      
      <rect x="110" y="72" width="100" height="22" rx="4" fill="#3A506B"/>
      <text x="160" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">OPEN</text>
      
      <text x="230" y="87" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0">Atanan: analyst@sw.ai</text>
    </g>
    
    <!-- Incident Item 3 -->
    <g transform="translate(20, 310)">
      <rect width="550" height="110" rx="8" fill="#0A0E1A" stroke="#1C2541" stroke-width="1"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">INCIDENT #302: Anormal Port Tarama</text>
      <text x="20" y="55" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Kaynak: 192.168.1.55 | 3.500 Paket | Model Güveni: %62.1</text>
      
      <!-- Badges -->
      <rect x="20" y="72" width="80" height="22" rx="4" fill="#D69E2E"/>
      <text x="60" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">MEDIUM</text>
      
      <rect x="110" y="72" width="100" height="22" rx="4" fill="#38A169"/>
      <text x="160" y="87" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#FFFFFF" text-anchor="middle">RESOLVED</text>
      
      <text x="230" y="87" font-family="system-ui, sans-serif" font-size="11" fill="#A0AEC0">Atanan: admin@sw.ai</text>
    </g>
  </g>
  
  <!-- Right Column: Incident Details (W: 610, H: 540) -->
  <g transform="translate(710, 210)">
    <rect width="630" height="540" rx="12" fill="#0B132B" stroke="#1C2541" stroke-width="1.5"/>
    <text x="30" y="40" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Olay Detayları ve Müdahale</text>
    
    <!-- Detail Pane Info -->
    <g transform="translate(30, 60)">
      <rect width="570" height="150" rx="8" fill="#0A0E1A" stroke="#1C2541" stroke-width="1"/>
      <text x="20" y="30" font-family="system-ui, sans-serif" font-size="15" font-weight="bold" fill="#6FFFE9">INCIDENT #303</text>
      
      <!-- Details Grid -->
      <text x="20" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Tip: DoS Saldırı Tespiti</text>
      <text x="250" y="60" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Kaynak IP: 192.168.1.50</text>
      
      <text x="20" y="85" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Tetiklenme: 15.07.2026 11:20</text>
      <text x="250" y="85" font-family="system-ui, sans-serif" font-size="12" fill="#A0AEC0">Hedef IP: 10.0.0.8</text>
      
      <text x="20" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF">Atanan Analist: <tspan font-weight="normal" fill="#6FFFE9">analyst@sw.ai</tspan></text>
      
      <!-- Dropdown Control Mockup (Status change) -->
      <g transform="translate(380, 103)">
        <rect width="170" height="30" rx="4" fill="#1C2541" stroke="#3A506B" stroke-width="1"/>
        <text x="15" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#FFFFFF">Durum: IN_PROGRESS</text>
        <path d="M 150,12 L 155,18 L 160,12" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
      </g>
    </g>
    
    <!-- Timeline and Notes -->
    <text x="30" y="240" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">Analist Müdahale Geçmişi</text>
    
    <!-- Timeline Event 1 -->
    <g transform="translate(30, 260)">
      <circle cx="15" cy="15" r="5" fill="#5BC0BE"/>
      <line x1="15" y1="20" x2="15" y2="70" stroke="#1C2541" stroke-width="2"/>
      <text x="35" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0">15.07.2026 11:25 | analyst@sw.ai</text>
      <text x="35" y="38" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF">Kayıt paket yoğunluğu limitleri aşıyor. Kaynak IP incelenmeye alındı.</text>
    </g>
    
    <!-- Timeline Event 2 -->
    <g transform="translate(30, 315)">
      <circle cx="15" cy="15" r="5" fill="#5BC0BE"/>
      <text x="35" y="18" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="#A0AEC0">15.07.2026 11:40 | analyst@sw.ai</text>
      <text x="35" y="38" font-family="system-ui, sans-serif" font-size="12" fill="#FFFFFF">Model doğruluk skoru %94.2. False-positive ihtimali düşük.</text>
    </g>
    
    <!-- Add Note Section -->
    <g transform="translate(30, 390)">
      <text x="0" y="15" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#A0AEC0">Olay Geçmişine Not Ekle</text>
      
      <!-- Text Area Mockup -->
      <rect y="25" width="570" height="70" rx="6" fill="#0A0E1A" stroke="#1C2541" stroke-width="1"/>
      <text x="15" y="45" font-family="system-ui, sans-serif" font-size="12" fill="#3A506B">Analiz ve müdahale notunuzu buraya yazın...</text>
      
      <!-- Submit Button -->
      <rect x="420" y="105" width="150" height="30" rx="6" fill="#5BC0BE"/>
      <text x="495" y="124" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#0A0E1A" text-anchor="middle">Notu Ekle ve Kaydet</text>
    </g>
  </g>
  
  <!-- System Status Footer -->
  <text x="720" y="870" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#3A506B" text-anchor="middle">
    SecureWatch AI v0.1.0-prototype | Akademik UNSW-NB15 Karar Destek Prototipi
  </text>
</svg>
